name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Zyx source
        uses: actions/checkout@v4
        with:
          repository: ZyxLang/zyx
          path: zyx-source
          ref: main

      - name: Setup Emscripten
        uses: mymind/activate-emsdk@v3
        with:
          version: 3.1.64

      - name: Build Zyx WASM
        working-directory: zyx-source
        run: |
          emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release
          cmake --build build-wasm

      - name: Copy WASM into site public/
        run: |
          cp zyx-source/build-wasm/wasm/zyx.js public/zyx.js
          cp zyx-source/build-wasm/wasm/zyx.wasm public/zyx.wasm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
